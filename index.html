<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Messages</title>
  <style>
    :root {
      --bg-color: #000000;
      --bubble-sent: #0b84ff;
      --bubble-received: #26252a;
      --text-color: #ffffff;
      --input-bg: #1c1c1e;
      --border-color: #2c2c2e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    html, body {
      background-color: var(--bg-color);
      color: var(--text-color);
      height: 100%;
      width: 100%;
      overflow: hidden;
      position: fixed;
    }

    /* Outer Wrapper using visualViewport height via JS */
    #app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      height: 100dvh; /* Dynamic Viewport Units for iOS Safari */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Secret Invisible Reset Target at Top Left */
    #secret-reset-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 50px;
      height: 50px;
      z-index: 9999;
      background: transparent;
    }

    /* Fake Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 0.5px solid var(--border-color);
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 10;
    }

    .header-back {
      color: #0b84ff;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-contact {
      text-align: center;
    }

    .contact-avatar {
      width: 30px;
      height: 30px;
      background-color: #8e8e93;
      border-radius: 50%;
      margin: 0 auto 2px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .contact-name {
      font-size: 12px;
      color: #8e8e93;
      font-weight: 400;
    }

    /* Messages Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: 75%;
      padding: 8px 14px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.35;
      word-wrap: break-word;
      animation: popIn 0.15s cubic-bezier(0.1, 0.9, 0.2, 1);
    }

    .message.sent {
      align-self: flex-end;
      background-color: var(--bubble-sent);
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .message.received {
      align-self: flex-start;
      background-color: var(--bubble-received);
      color: #ffffff;
      border-bottom-left-radius: 4px;
    }

    /* Input Bar (Stick to keyboard) */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background-color: #000000;
      border-top: 0.5px solid var(--border-color);
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    .input-wrapper {
      flex: 1;
      background-color: var(--input-bg);
      border-radius: 20px;
      border: 0.5px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 6px 12px;
    }

    .input-field {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font-size: 16px;
      max-height: 100px;
      resize: none;
    }

    .send-btn {
      width: 30px;
      height: 30px;
      background-color: var(--bubble-sent);
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .send-btn svg {
      fill: #ffffff;
      width: 16px;
      height: 16px;
    }

    @keyframes popIn {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Invisible secret trigger at top left corner -->
  <div id="secret-reset-zone" onclick="clearMessages()"></div>

  <div id="app-container">
    <!-- Header -->
    <div class="header">
      <div class="header-back">
        <svg width="12" height="20" viewBox="0 0 12 20" fill="none">
          <path d="M10 2L2 10L10 18" stroke="#0B84FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-contact">
        <div class="contact-avatar">M</div>
        <div class="contact-name">Mom &gt;</div>
      </div>
      <div style="width: 20px;"></div>
    </div>

    <!-- Messages Container -->
    <div class="chat-area" id="chatArea">
      <!-- Messages appear here -->
    </div>

    <!-- Bottom Input Bar -->
    <div class="input-bar" id="inputBar">
      <div class="input-wrapper">
        <input type="text" id="messageInput" class="input-field" placeholder="iMessage" autocomplete="off" />
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24">
          <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" transform="rotate(-90 12 12)"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const appContainer = document.getElementById('app-container');

    // Send Message
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      const msgDiv = document.createElement('div');
      msgDiv.className = 'message sent';
      msgDiv.textContent = text;

      chatArea.appendChild(msgDiv);
      messageInput.value = '';
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Enter key sends
    messageInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // Clear all messages (secret reset)
    function clearMessages() {
      chatArea.innerHTML = '';
    }

    // 3-finger triple tap to secret clear as well
    let tapCount = 0;
    document.addEventListener('touchstart', function(e) {
      if (e.touches.length === 3) {
        clearMessages();
      }
    });

    // Handle iOS Keyboard Viewport resizing dynamically
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        appContainer.style.height = window.visualViewport.height + 'px';
        chatArea.scrollTop = chatArea.scrollHeight;
      });
      window.visualViewport.addEventListener('scroll', () => {
        appContainer.style.height = window.visualViewport.height + 'px';
      });
    }
  </script>
</body>
</html>
