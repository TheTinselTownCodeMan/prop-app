<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>iMessage Simulator</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      height: -webkit-fill-available;
      background-color: #fff;
      position: relative;
    }

    /* Top Bar Header */
    .chat-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(env(safe-area-inset-top) + 8px);
      padding-bottom: 8px;
      background: rgba(249, 249, 249, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.15);
      z-index: 10;
    }

    .contact-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8E8E93, #636366);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .contact-name {
      font-size: 12px;
      font-weight: 500;
      color: #000;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .contact-name::after {
      content: "›";
      font-size: 14px;
      color: #8C8C8E;
    }

    /* Chat Messages Body */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background-color: #fff;
    }

    .message {
      max-width: 75%;
      padding: 8px 14px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.35;
      word-wrap: break-word;
    }

    .message.sent {
      align-self: flex-end;
      background-color: #34C759;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.received {
      align-self: flex-start;
      background-color: #E9E9EB;
      color: #000;
      border-bottom-left-radius: 4px;
    }

    /* Input Dock Area */
    .input-dock {
      background: #F9F9F9;
      border-top: 0.5px solid rgba(0, 0, 0, 0.12);
      padding: 8px 12px;
      padding-bottom: 4px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .add-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #E9E9EB;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #636366;
      font-size: 20px;
      font-weight: 300;
      cursor: pointer;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .input-container {
      flex: 1;
      min-height: 36px;
      max-height: 120px;
      background: #FFFFFF;
      border: 1px solid #C6C6C8;
      border-radius: 18px;
      padding: 6px 12px 6px 12px;
      display: flex;
      align-items: center;
      position: relative;
    }

    /* ContentEditable Text Box */
    .text-display {
      width: 100%;
      outline: none;
      font-size: 16px;
      line-height: 1.3;
      color: #000;
      white-space: pre-wrap;
      word-break: break-word;
      user-select: text;
      -webkit-user-select: text;
      max-height: 100px;
      overflow-y: auto;
    }

    .text-display:empty::before {
      content: "iMessage";
      color: #8E8E93;
      pointer-events: none;
    }

    .send-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #34C759;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: 6px;
      opacity: 0.3;
      pointer-events: none;
      transition: opacity 0.15s ease;
      margin-bottom: 2px;
    }

    .send-btn.active {
      opacity: 1;
      pointer-events: auto;
    }

    .send-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* iOS Keyboard Styling */
    .keyboard {
      background: #D1D3D9;
      padding: 6px 3px calc(env(safe-area-inset-bottom) + 6px) 3px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      width: 100%;
    }

    .key {
      background: #FFFFFF;
      border-radius: 5px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
      height: 42px;
      flex: 1;
      max-width: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 400;
      color: #000;
      cursor: pointer;
      position: relative;
    }

    .key.pressed {
      background: #B4B7AC;
    }

    .key.special {
      background: #ACB1BC;
      font-size: 15px;
      max-width: none;
    }

    .key.special.pressed {
      background: #FFFFFF;
    }

    .key.space-btn {
      flex: 5;
      max-width: none;
      font-size: 15px;
    }

    .key.return-btn {
      flex: 2.2;
      max-width: none;
      font-size: 15px;
      color: #000;
    }

    .key.backspace-btn, .key.shift-btn {
      flex: 1.4;
      max-width: none;
    }

    .key svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Key Popup Preview */
    .key-popup {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 52px;
      background: #FFFFFF;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 400;
      color: #000;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="contact-avatar">JD</div>
      <div class="contact-name">John Doe</div>
    </div>

    <!-- Messages Window -->
    <div class="chat-messages" id="chatMessages">
      <div class="message received">Hey! Let me know when you're on set.</div>
    </div>

    <!-- Input Dock -->
    <div class="input-dock">
      <div class="add-btn">+</div>
      <div class="input-container">
        <div class="text-display" id="visualDisplay" contenteditable="true" spellcheck="false"></div>
      </div>
      <div class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M12 3L4 11H9V21H15V11H20L12 3Z"/></svg>
      </div>
    </div>

    <!-- Simulated iOS Keyboard -->
    <div class="keyboard" id="keyboard">
      <!-- Row 1 -->
      <div class="keyboard-row">
        <div class="key" data-char="q">q</div>
        <div class="key" data-char="w">w</div>
        <div class="key" data-char="e">e</div>
        <div class="key" data-char="r">r</div>
        <div class="key" data-char="t">t</div>
        <div class="key" data-char="y">y</div>
        <div class="key" data-char="u">u</div>
        <div class="key" data-char="i">i</div>
        <div class="key" data-char="o">o</div>
        <div class="key" data-char="p">p</div>
      </div>

      <!-- Row 2 -->
      <div class="keyboard-row">
        <div class="key" data-char="a">a</div>
        <div class="key" data-char="s">s</div>
        <div class="key" data-char="d">d</div>
        <div class="key" data-char="f">f</div>
        <div class="key" data-char="g">g</div>
        <div class="key" data-char="h">h</div>
        <div class="key" data-char="j">j</div>
        <div class="key" data-char="k">k</div>
        <div class="key" data-char="l">l</div>
      </div>

      <!-- Row 3 -->
      <div class="keyboard-row">
        <div class="key special shift-btn" id="shiftBtn">
          <svg viewBox="0 0 24 24"><path d="M12 4L5 13H9V20H15V13H19L12 4Z"/></svg>
        </div>
        <div class="key" data-char="z">z</div>
        <div class="key" data-char="x">x</div>
        <div class="key" data-char="c">c</div>
        <div class="key" data-char="v">v</div>
        <div class="key" data-char="b">b</div>
        <div class="key" data-char="n">n</div>
        <div class="key" data-char="m">m</div>
        <div class="key special backspace-btn" id="backspaceBtn">
          <svg viewBox="0 0 24 24"><path d="M22 3H7C6.3 3 5.7 3.3 5.3 3.8L0 12L5.3 20.2C5.7 20.7 6.3 21 7 21H22C23.1 21 24 20.1 24 19V5C24 3.9 23.1 3 22 3ZM18.3 15.3L16.9 16.7L13 12.8L9.1 16.7L7.7 15.3L11.6 11.4L7.7 7.5L9.1 6.1L13 10L16.9 6.1L18.3 7.5L14.4 11.4L18.3 15.3Z"/></svg>
        </div>
      </div>

      <!-- Row 4 -->
      <div class="keyboard-row">
        <div class="key special mode-toggle">123</div>
        <div class="key special mic-toggle">
          <svg viewBox="0 0 24 24"><path d="M12 14C13.66 14 15 12.66 15 11V5C15 3.34 13.66 2 12 2C10.34 2 9 3.34 9 5V11C9 12.66 10.34 14 12 14ZM17.3 11C17.3 14 14.76 16.1 12 16.1C9.24 16.1 6.7 14 6.7 11H5C5 14.41 7.72 17.23 11 17.72V21H13V17.72C16.28 17.23 19 14.41 19 11H17.3Z"/></svg>
        </div>
        <div class="key space-btn" data-char=" ">space</div>
        <div class="key special return-btn" id="returnBtn">return</div>
      </div>
    </div>
  </div>

  <script>
    const visualDisplay = document.getElementById("visualDisplay");
    const sendBtn = document.getElementById("sendBtn");
    const chatMessages = document.getElementById("chatMessages");
    const shiftBtn = document.getElementById("shiftBtn");
    
    let isShift = false;
    let backspaceInterval = null;
    let activeBackspaceKey = null;

    // Web Audio API Haptic Sound Generator
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'tap') {
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.03);
      }
    }

    function triggerHaptic(type) {
      if (navigator.vibrate) {
        if (type === 'light') navigator.vibrate(10);
      }
    }

    function updateSendButton() {
      if (visualDisplay.innerText.trim().length > 0) {
        sendBtn.classList.add("active");
      } else {
        sendBtn.classList.remove("active");
      }
    }

    function autoScrollDisplay() {
      visualDisplay.scrollTop = visualDisplay.scrollHeight;
    }

    // Single-Character Insertion
    function insertAtCursor(text) {
      visualDisplay.focus();
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;

      let range = sel.getRangeAt(0);

      if (!visualDisplay.contains(range.commonAncestorContainer)) {
        range = document.createRange();
        range.selectNodeContents(visualDisplay);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      }

      const textNode = document.createTextNode(text);
      range.deleteContents();
      range.insertNode(textNode);

      range.setStartAfter(textNode);
      range.setEndAfter(textNode);
      sel.removeAllRanges();
      sel.addRange(range);

      visualDisplay.normalize();
      updateSendButton();
      autoScrollDisplay();

      if (isShift && text !== ' ') {
        toggleShift(false);
      }
    }

    // FIX: Single-Character Deletion
    function deleteAtCursor() {
      visualDisplay.focus();
      
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;

      let range = sel.getRangeAt(0);

      // If text is manually highlighted, delete selection
      if (!range.collapsed) {
        range.deleteContents();
        visualDisplay.normalize();
        updateSendButton();
        autoScrollDisplay();
        return;
      }

      // If cursor is at start of field, do nothing
      if (range.startOffset === 0 && range.startContainer === visualDisplay) {
        return;
      }

      // Execute single-character backspace
      document.execCommand('delete', false, null);
      
      visualDisplay.normalize();
      updateSendButton();
      autoScrollDisplay();
    }

    function toggleShift(state) {
      isShift = state !== undefined ? state : !isShift;
      const keys = document.querySelectorAll(".key[data-char]");
      keys.forEach(k => {
        const char = k.getAttribute("data-char");
        if (char && char.length === 1 && char !== " ") {
          k.innerText = isShift ? char.toUpperCase() : char.toLowerCase();
        }
      });
      if (isShift) {
        shiftBtn.classList.add("pressed");
      } else {
        shiftBtn.classList.remove("pressed");
      }
    }

    function showKeyPopup(keyElement, char) {
      const popup = document.createElement("div");
      popup.className = "key-popup";
      popup.innerText = char;
      keyElement.appendChild(popup);
      setTimeout(() => {
        popup.remove();
      }, 120);
    }

    // Keyboard Key Touch & Hold Events
    document.querySelectorAll(".key").forEach(key => {
      if (key.classList.contains("mic-toggle") || key.classList.contains("mode-toggle") || key.classList.contains("return-btn")) return;

      const isBackspace = key.classList.contains("backspace-btn");

      const handlePressStart = (e) => {
        e.preventDefault();
        key.classList.add("pressed");
        playSound('tap');
        triggerHaptic('light');

        if (isBackspace) {
          stopBackspace();
          activeBackspaceKey = key;
          
          // 1. Delete ONE single character on initial tap
          deleteAtCursor();

          // 2. Wait 400ms before backspacing character-by-character continuously
          backspaceInterval = setTimeout(() => {
            backspaceInterval = setInterval(() => {
              deleteAtCursor();
            }, 50);
          }, 400);

        } else {
          let charVal = key.getAttribute("data-char");
          if (charVal !== null) {
            if (isShift && charVal.length === 1 && charVal !== " ") {
              charVal = charVal.toUpperCase();
            }
            insertAtCursor(charVal);
            if (charVal.trim().length === 1) {
              showKeyPopup(key, charVal);
            }
          }
        }
      };

      const handlePressEnd = () => {
        if (!isBackspace) {
          key.classList.remove("pressed");
        } else {
          stopBackspace();
        }
      };

      key.addEventListener("touchstart", handlePressStart, { passive: false });
      key.addEventListener("touchend", handlePressEnd);
      key.addEventListener("mousedown", handlePressStart);
      key.addEventListener("mouseup", handlePressEnd);
      key.addEventListener("mouseleave", handlePressEnd);
    });

    function stopBackspace() {
      if (backspaceInterval) {
        clearTimeout(backspaceInterval);
        clearInterval(backspaceInterval);
        backspaceInterval = null;
      }
      if (activeBackspaceKey) {
        activeBackspaceKey.classList.remove("pressed");
        activeBackspaceKey = null;
      }
    }

    // Shift Toggle Event
    shiftBtn.addEventListener("click", () => {
      toggleShift();
    });

    // Send Button Action
    sendBtn.addEventListener("click", () => {
      const text = visualDisplay.innerText.trim();
      if (!text) return;

      const msgDiv = document.createElement("div");
      msgDiv.className = "message sent";
      msgDiv.innerText = text;
      chatMessages.appendChild(msgDiv);

      visualDisplay.innerText = "";
      updateSendButton();
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });

    // Monitor Direct Typing or Pastes
    visualDisplay.addEventListener("input", () => {
      updateSendButton();
      autoScrollDisplay();
    });
  </script>
</body>
</html>
