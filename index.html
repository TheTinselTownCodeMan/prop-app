<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">

  <title>Messages</title>
  <style>
    :root {
      --header-bg: rgba(18, 18, 26, 0.65);
      --app-bg: #030508;
      --border-color: rgba(0, 243, 255, 0.25);
      
      /* Holographic Cyan & Blue Accents */
      --holo-cyan: #00f3ff;
      --holo-blue: #0b84fe;
      --holo-magenta: #ff00ff;
      
      /* Glowing Multi-layer Shadows */
      --neon-glow-cyan: 0 0 10px rgba(0, 243, 255, 0.6), 0 0 20px rgba(0, 243, 255, 0.3), inset 0 0 8px rgba(0, 243, 255, 0.4);
      --neon-glow-blue: 0 0 12px rgba(11, 132, 254, 0.7), 0 0 25px rgba(11, 132, 254, 0.4), inset 0 0 10px rgba(0, 243, 255, 0.5);
      --holo-glass-bg: rgba(16, 24, 40, 0.55);

      --input-bg: rgba(10, 15, 26, 0.75);
      --kbd-bg: rgba(8, 12, 20, 0.85);
      
      /* 3D Glass Keycap Palette */
      --key-top: rgba(40, 55, 80, 0.8);
      --key-bottom: rgba(15, 22, 35, 0.95);
      --key-shadow: #020408;
      --key-border: rgba(0, 243, 255, 0.35);
      --popup-bg: rgba(20, 30, 50, 0.95);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: var(--app-bg);
      background-image: 
        radial-gradient(circle at 50% 20%, rgba(0, 243, 255, 0.08) 0%, transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(11, 132, 254, 0.08) 0%, transparent 50%);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      position: absolute;
      top: 0; bottom: 0; left: 0; right: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    #app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    /* SECRET RESET ZONE */
    #secret-reset-zone {
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 60px;
      z-index: 9999;
      background: transparent;
    }

    /* HEADER - Glass Holo */
    #app-header {
      min-height: 50px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 4px 20px rgba(0, 243, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      padding-top: max(4px, env(safe-area-inset-top));
      flex-shrink: 0;
      z-index: 10;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .header-back {
      color: var(--holo-cyan);
      font-size: 17px;
      display: flex;
      align-items: center;
      filter: drop-shadow(0 0 6px var(--holo-cyan));
    }

    /* CHAT VIEW CONTAINER */
    #chat-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      height: 100%;
    }

    /* TIMELINE */
    #chat-timeline {
      flex: 1 1 auto;
      padding: 16px;
      overflow-y: scroll;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      overscroll-behavior-y: contain;
      z-index: 1;
    }

    .msg-row { 
      display: flex; 
      flex-direction: column; 
      max-width: 80%; 
      position: relative;
      perspective: 1000px;
      animation: springPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes springPop {
      0% { opacity: 0; transform: scale(0.85) translateY(12px) rotateX(-10deg); }
      100% { opacity: 1; transform: scale(1) translateY(0) rotateX(0deg); }
    }

    .inbound-align { align-self: flex-start; }
    .outbound-align { align-self: flex-end; }

    /* 3D HOLOGRAPHIC BUBBLES */
    .msg-box {
      border-radius: 18px;
      padding: 12px 16px;
      font-size: 16px;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
      cursor: pointer;
      position: relative;
      transition: all 0.15s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
    }

    .msg-box:active {
      transform: scale(0.96) translateZ(-5px);
    }

    /* Inbound - Dark Glass & Cyan Edge Glow */
    .msg-inbound {
      background: var(--holo-glass-bg);
      color: #ffffff;
      border: 1px solid rgba(0, 243, 255, 0.35);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.2),
        0 8px 20px rgba(0, 0, 0, 0.6),
        0 0 12px rgba(0, 243, 255, 0.25);
    }

    /* Outbound - Holographic Blue/Cyan Gradient + Bevel */
    .msg-outbound {
      background: linear-gradient(135deg, rgba(11, 132, 254, 0.85) 0%, rgba(0, 85, 179, 0.9) 100%);
      color: #ffffff;
      border: 1px solid rgba(0, 243, 255, 0.6);
      box-shadow: var(--neon-glow-blue);
    }

    /* TAILS */
    .has-tail.msg-inbound { border-bottom-left-radius: 4px; }
    .has-tail.msg-inbound::after {
      content: '';
      position: absolute;
      bottom: 0; left: -6px;
      width: 10px; height: 10px;
      background: var(--holo-glass-bg);
      border-left: 1px solid rgba(0, 243, 255, 0.35);
      border-bottom: 1px solid rgba(0, 243, 255, 0.35);
      clip-path: polygon(100% 0, 0 100%, 100% 100%);
    }

    .has-tail.msg-outbound { border-bottom-right-radius: 4px; }
    .has-tail.msg-outbound::after {
      content: '';
      position: absolute;
      bottom: 0; right: -6px;
      width: 10px; height: 10px;
      background: rgba(0, 85, 179, 0.9);
      border-right: 1px solid rgba(0, 243, 255, 0.6);
      border-bottom: 1px solid rgba(0, 243, 255, 0.6);
      clip-path: polygon(0 0, 0 100%, 100% 100%);
    }

    /* TAPBACK BADGE */
    .tapback-badge {
      position: absolute;
      top: -12px;
      background: rgba(20, 30, 50, 0.95);
      border: 1px solid var(--holo-cyan);
      box-shadow: var(--neon-glow-cyan);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 13px;
      z-index: 5;
    }

    .inbound-align .tapback-badge { right: -6px; }
    .outbound-align .tapback-badge { left: -6px; }

    #tapback-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .tapback-bar {
      background: rgba(15, 22, 35, 0.9);
      border: 1px solid var(--holo-cyan);
      box-shadow: var(--neon-glow-cyan);
      border-radius: 24px;
      padding: 8px 16px;
      display: flex; gap: 14px;
    }

    .status-stamp { 
      font-size: 10px; 
      color: rgba(0, 243, 255, 0.6); 
      margin-top: 4px; margin-bottom: 6px;
      padding: 0 4px; 
      font-weight: 500;
      text-shadow: 0 0 4px rgba(0, 243, 255, 0.4);
    }

    .outbound-align .status-stamp { text-align: right; }

    /* TYPING INDICATOR */
    #typing-monitor {
      display: none;
      align-self: flex-start;
      background: var(--holo-glass-bg);
      padding: 10px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      margin-left: 16px; margin-bottom: 8px;
      border: 1px solid rgba(0, 243, 255, 0.35);
      box-shadow: var(--neon-glow-cyan);
    }

    .pulse-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background-color: var(--holo-cyan);
      box-shadow: 0 0 8px var(--holo-cyan);
      margin: 0 2px;
      animation: pulse 1.2s infinite;
    }
    .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
    .pulse-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* BOTTOM CONTAINER */
    #bottom-deck-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      position: relative;
      flex-shrink: 0;
      z-index: 50;
    }

    #footer-bar {
      border-top: 1px solid var(--border-color);
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: rgba(8, 12, 20, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      width: 100%;
    }

    .input-container { display: flex; align-items: flex-end; gap: 8px; width: 100%; }

    #visual-display {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid rgba(0, 243, 255, 0.4);
      border-radius: 20px;
      background: var(--input-bg);
      color: #ffffff;
      font-size: 16px;
      line-height: 1.3;
      min-height: 40px; max-height: 120px;
      overflow-y: auto;
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.8), 0 0 10px rgba(0, 243, 255, 0.2);
      outline: none;
      caret-color: var(--holo-cyan);
    }

    #action-trigger {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(30, 45, 65, 0.8);
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(0, 243, 255, 0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; margin-bottom: 2px;
      transition: all 0.2s ease;
    }

    #action-trigger.ready {
      background: var(--holo-blue);
      color: #ffffff;
      border-color: var(--holo-cyan);
      box-shadow: var(--neon-glow-cyan);
    }

    /* 3D HOLOGRAPHIC KEYBOARD */
    #custom-keyboard {
      background: var(--kbd-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; flex-shrink: 0;
      position: relative;
      border-top: 1px solid var(--border-color);
      perspective: 800px;
    }

    .kbd-keys-wrapper {
      padding: 12px 4px 0 4px;
      display: flex; flex-direction: column; gap: 10px;
      transform-style: preserve-3d;
    }

    .kbd-row { 
      display: flex; justify-content: center; gap: 6px; width: 100%;
    }

    /* 3D Keycaps with Holographic Glass & Layered Shadows */
    .key {
      background: linear-gradient(180deg, var(--key-top) 0%, var(--key-bottom) 100%);
      color: #ffffff;
      font-size: 18px; font-weight: 600;
      border-radius: 8px;
      height: 44px; flex: 1;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--key-border);
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.35),
        inset 0 -2px 4px rgba(0, 0, 0, 0.6),
        0 5px 0 var(--key-shadow),
        0 8px 15px rgba(0, 0, 0, 0.7),
        0 0 6px rgba(0, 243, 255, 0.25);
      position: relative; cursor: pointer;
      transition: transform 0.06s ease, box-shadow 0.06s ease, border-color 0.06s ease;
      text-shadow: 0 0 6px var(--holo-cyan);
    }

    .key:active, .key.pressed {
      transform: translateY(4px) translateZ(-4px);
      border-color: var(--holo-cyan);
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 0 8px rgba(0, 243, 255, 0.6),
        0 1px 0 var(--key-shadow),
        0 2px 5px rgba(0, 0, 0, 0.8),
        0 0 12px var(--holo-cyan);
    }

    .key-special {
      background: linear-gradient(180deg, rgba(25, 35, 55, 0.85) 0%, rgba(12, 18, 30, 0.95) 100%);
      font-size: 13px; flex: 1.4; text-shadow: none;
    }

    .key-space { flex: 4.5; font-size: 13px; color: rgba(255, 255, 255, 0.6); text-shadow: none; }

    /* HOLOGRAPHIC POPUP BADGE */
    .key-popup {
      position: absolute;
      top: -56px;
      width: 50px; height: 58px;
      background: var(--popup-bg);
      color: #ffffff;
      border-radius: 10px;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 6px;
      font-size: 26px; font-weight: 700;
      border: 1px solid var(--holo-cyan);
      box-shadow: var(--neon-glow-cyan), 0 10px 25px rgba(0, 0, 0, 0.8);
      z-index: 999;
      pointer-events: none;
      transform: translateX(-50%);
      left: 50%;
      text-shadow: 0 0 10px var(--holo-cyan);
    }

    .key-popup::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: var(--popup-bg) transparent;
      display: block; width: 0;
    }
  </style>
</head>
<body>

  <div id="secret-reset-zone" onclick="resetScene()"></div>

  <div id="tapback-overlay">
    <div class="tapback-bar">
      <span class="tapback-option">❤️</span>
      <span class="tapback-option">👍</span>
      <span class="tapback-option">👎</span>
      <span class="tapback-option">😆</span>
      <span class="tapback-option">‼️</span>
      <span class="tapback-option">❓</span>
    </div>
  </div>

  <div id="app-container">
    <div id="app-header">
      <div class="header-back">
        <svg width="12" height="20" viewBox="0 0 12 20" fill="none">
          <path d="M10 2L2 10L10 18" stroke="#00f3ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-contact"></div>
      <div style="width: 20px;"></div>
    </div>

    <div id="chat-view">
      <div id="chat-timeline"></div>

      <div id="typing-monitor">
        <span class="pulse-dot"></span>
        <span class="pulse-dot"></span>
        <span class="pulse-dot"></span>
      </div>

      <div id="bottom-deck-wrapper">
        <div id="interactive-bottom-deck">
          <div id="footer-bar">
            <div class="input-container">
              <div id="visual-display" contenteditable="true" spellcheck="false" autocorrect="off" autocapitalize="off" data-gramm="false"></div>
              <button id="action-trigger" aria-label="Send">
                <svg viewBox="0 0 24 24" width="18" height="18">
                  <path d="M12 3L12 21M12 3L5 10M12 3L19 10" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

          <div id="custom-keyboard">
            <div class="kbd-keys-wrapper">
              <div id="alpha-layout" style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <div class="kbd-row">
                  <div class="key" data-char="q">q</div><div class="key" data-char="w">w</div>
                  <div class="key" data-char="e">e</div><div class="key" data-char="r">r</div>
                  <div class="key" data-char="t">t</div><div class="key" data-char="y">y</div>
                  <div class="key" data-char="u">u</div><div class="key" data-char="i">i</div>
                  <div class="key" data-char="o">o</div><div class="key" data-char="p">p</div>
                </div>
                <div class="kbd-row" style="padding: 0 12px;">
                  <div class="key" data-char="a">a</div><div class="key" data-char="s">s</div>
                  <div class="key" data-char="d">d</div><div class="key" data-char="f">f</div>
                  <div class="key" data-char="g">g</div><div class="key" data-char="h">h</div>
                  <div class="key" data-char="j">j</div><div class="key" data-char="k">k</div>
                  <div class="key" data-char="l">l</div>
                </div>
                <div class="kbd-row">
                  <div class="key key-special key-icon">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3L4 12h5v8h6v-8h5z"/></svg>

                  <div class="key" data-char="z">z</div><div class="key" data-char="x">x</div>

                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
                  </div>
                </div>
                <div class="kbd-row">
                  <div class="key key-special mode-toggle">123</div>

                  <div class="key" data-char="1">1</div><div class="key" data-char="2">2</div>

                  <div class="key" data-char="7">7</div><div class="key" data-char="8">8</div>

                  <div class="key" data-char="-">-</div><div class="key" data-char="/">/</div>
                  <div class="key" data-char=":">:</div><div class="key" data-char=";">;</div>
                  <div class="key" data-char="(">(</div><div class="key" data-char=")">)</div>
                  <div class="key" data-char="$">$</div><div class="key" data-char="&">&</div>
                  <div class="key" data-char="@">@</div><div class="key" data-char='"'>"</div>
                </div>
                <div class="kbd-row">
                  <div class="key" data-char=".">.</div><div class="key" data-char=",">,</div>
                  <div class="key" data-char="?">?</div><div class="key" data-char="!">!</div>
                  <div class="key" data-char="'">'</div><div class="key" data-char="#">#</div>
                  <div class="key key-special key-icon backspace-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
                  </div>
                </div>
                <div class="kbd-row">
                  <div class="key key-special mode-toggle">ABC</div>
                  <div class="key key-space" data-char=" ">space</div>
                  <div class="key key-special return-btn">return</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const inboundScript = [
      { triggerAfterMsgCount: 2, text: "Copy that. Watch your back, radar indicates movement near you." },
      { triggerAfterMsgCount: 3, text: "I'm waiting by the north entrance." },
      { triggerAfterMsgCount: 5, text: "Clear to move. Backup is in position." }
    ];

    const RESPONSE_DELAY_MS = 4500;
    const READ_DELAY_MS = 2500;

    let outgoingCount = 0;
    let isNumMode = false;
    let backspaceInterval = null;
    let activeBackspaceKey = null;
    let isKbdHidden = false;
    let activeTapbackTarget = null;

    const chatTimeline = document.getElementById("chat-timeline");
    let visualDisplay = document.getElementById("visual-display");
    const actionTrigger = document.getElementById("action-trigger");
    const typingMonitor = document.getElementById("typing-monitor");
    const alphaLayout = document.getElementById("alpha-layout");
    const numLayout = document.getElementById("num-layout");
    const tapbackOverlay = document.getElementById("tapback-overlay");

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'send') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
        osc.start(); osc.stop(audioCtx.currentTime + 0.12);
      } else if (type === 'receive') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(750, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.18);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.18);
        osc.start(); osc.stop(audioCtx.currentTime + 0.18);
      } else if (type === 'tap') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(140, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
        osc.start(); osc.stop(audioCtx.currentTime + 0.03);
      }
    }

    function triggerHaptic(type = 'light') {
      if (!navigator.vibrate) return;
      if (type === 'light') navigator.vibrate(10);
      else if (type === 'medium') navigator.vibrate(25);
      else if (type === 'double') navigator.vibrate([15, 30, 15]);
    }

    function attachInputListeners(el) {
      el.addEventListener("focus", () => el.setAttribute("inputmode", "none"));
      el.addEventListener("input", () => {
        el.normalize();
        updateSendButton();
        autoScrollDisplay();
      });
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault(); handleSend();
        }
      });
    }

    attachInputListeners(visualDisplay);

    function autoScrollDisplay() { visualDisplay.scrollTop = visualDisplay.scrollHeight; }

    function forceClearInput() {
      visualDisplay.textContent = "";
      updateSendButton();
    }

    function insertAtCursor(text) {
      visualDisplay.focus();
      const sel = window.getSelection();
      if (sel && sel.rangeCount > 0) {
        let range = sel.getRangeAt(0);
        if (!visualDisplay.contains(range.commonAncestorContainer)) {
          range = document.createRange();
          range.selectNodeContents(visualDisplay);
          range.collapse(false);
        }
        range.deleteContents();
        const textNode = document.createTextNode(text);
        range.insertNode(textNode);
        range.setStartAfter(textNode);
        range.setEndAfter(textNode);
        sel.removeAllRanges();
        sel.addRange(range);
      } else {
        visualDisplay.textContent += text;
      }
      visualDisplay.normalize();
      updateSendButton();
      autoScrollDisplay();
    }

    function deleteAtCursor() {
      visualDisplay.focus();
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      let range = sel.getRangeAt(0);
      if (!range.collapsed) {
        range.deleteContents();
      } else {
        document.execCommand('delete', false, null);
      }
      visualDisplay.normalize();
      updateSendButton();
      autoScrollDisplay();
    }

    function stopBackspace() {
      if (backspaceInterval) {
        clearTimeout(backspaceInterval);
        clearInterval(backspaceInterval);
        backspaceInterval = null;
      }
      if (activeBackspaceKey) {
        activeBackspaceKey.classList.remove("pressed");
        activeBackspaceKey = null;
      }
    }

    document.querySelectorAll(".key").forEach(key => {
      const isBackspace = key.classList.contains("backspace-btn");

      const handlePressStart = (e) => {
        e.preventDefault();
        key.classList.add("pressed");
        playSound('tap');
        triggerHaptic('light');

        if (isBackspace) {
          stopBackspace();
          activeBackspaceKey = key;
          deleteAtCursor();
          backspaceInterval = setTimeout(() => {
            backspaceInterval = setInterval(deleteAtCursor, 50);
          }, 400);
        } else if (key.classList.contains("mode-toggle")) {
          isNumMode = !isNumMode;
          alphaLayout.style.display = isNumMode ? "none" : "flex";
          numLayout.style.display = isNumMode ? "flex" : "none";
        } else if (key.classList.contains("return-btn")) {
          insertAtCursor("\n");
        } else {
          const charVal = key.getAttribute("data-char");
          if (charVal !== null) {
            insertAtCursor(charVal);
            if (charVal.trim().length === 1) showKeyPopup(key, charVal.toUpperCase());
          }
        }
      };

      const handlePressEnd = () => {
        if (!isBackspace) key.classList.remove("pressed");
        else stopBackspace();
      };

      key.addEventListener("touchstart", handlePressStart, { passive: false });
      key.addEventListener("touchend", handlePressEnd);
      key.addEventListener("mousedown", handlePressStart);
      key.addEventListener("mouseup", handlePressEnd);
    });

    function showKeyPopup(keyElement, charLabel) {
      const popup = document.createElement("div");
      popup.className = "key-popup";
      popup.textContent = charLabel;
      keyElement.appendChild(popup);
      setTimeout(() => popup.remove(), 150);
    }

    function updateSendButton() {
      const text = (visualDisplay.textContent || "").trim();
      if (text.length > 0) actionTrigger.classList.add("ready");
      else actionTrigger.classList.remove("ready");
    }

    actionTrigger.addEventListener("click", handleSend);

    function handleSend() {
      const text = (visualDisplay.textContent || "").trim();
      if (text.length === 0) return;

      playSound('send');
      triggerHaptic('medium');
      dispatchMessage(text, "outbound");
      outgoingCount++;
      forceClearInput();
      checkAndTriggerReply();
    }

    function checkAndTriggerReply() {
      const matchingReply = inboundScript.find(item => item.triggerAfterMsgCount === outgoingCount);
      if (matchingReply) {
        setTimeout(() => {
          typingMonitor.style.display = "block";
          chatTimeline.scrollTop = chatTimeline.scrollHeight;
        }, READ_DELAY_MS + 800);

        setTimeout(() => {
          typingMonitor.style.display = "none";
          playSound('receive');
          triggerHaptic('double');
          dispatchMessage(matchingReply.text, "inbound");
        }, RESPONSE_DELAY_MS);
      }
    }

    function dispatchMessage(text, vector) {
      const row = document.createElement("div");
      row.className = `msg-row ${vector}-align`;

      const box = document.createElement("div");
      box.className = `msg-box msg-${vector} has-tail`;
      box.textContent = text;

      const stamp = document.createElement("div");
      stamp.className = "status-stamp";
      
      if (vector === "outbound") {
        stamp.textContent = "Delivered";
        setTimeout(() => {
          const nowTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          stamp.textContent = `Read ${nowTime}`;
        }, READ_DELAY_MS);
      } else {
        stamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      row.appendChild(box);
      row.appendChild(stamp);
      chatTimeline.appendChild(row);
      chatTimeline.scrollTop = chatTimeline.scrollHeight;
    }

    function resetScene() {
      outgoingCount = 0;
      forceClearInput();
      chatTimeline.innerHTML = "";
      typingMonitor.style.display = "none";
    }

    updateSendButton();
  </script>
</body>
</html>
